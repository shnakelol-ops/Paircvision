<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PV — Audio Recording Investigation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060c14; color: #c8dff4; font-family: system-ui, sans-serif; font-size: 12px; padding: 10px; }
h1 { font-size: 14px; font-weight: 700; color: #6ab4ff; margin-bottom: 4px; }
p.sub { font-size: 10px; color: #4a6880; margin-bottom: 10px; }
canvas { border: 1px solid #1a3050; border-radius: 5px; display: block; width: 100%; max-width: 360px; }
video { display: block; width: 100%; max-width: 360px; max-height: 180px; border-radius: 5px; background: #000; margin: 6px 0; border: 1px solid #1a3050; }
.btn-row { display: flex; gap: 5px; max-width: 360px; margin-top: 6px; flex-wrap: wrap; }
.btn-row button { flex: 1; min-width: 80px; padding: 8px 4px; border-radius: 6px; border: 1px solid #2a4870; background: #0a1e38; color: #88bbee; font-size: 11px; font-weight: 600; cursor: pointer; line-height: 1.3; }
.btn-row button:disabled { opacity: 0.38; cursor: default; }
#btnStop { border-color: #602020; color: #ff8888; background: #1a0808; }
.action-row { display: flex; gap: 5px; max-width: 360px; margin-top: 5px; }
.action-row button { flex: 1; padding: 8px 4px; border-radius: 6px; border: 1px solid #2a4060; background: #081828; color: #70a0cc; font-size: 11px; font-weight: 600; cursor: pointer; }
.action-row button:disabled { opacity: 0.35; cursor: default; }
#statusLine { margin: 7px 0; font-size: 11px; font-weight: 700; color: #ffc840; min-height: 16px; }
#log { max-width: 360px; background: #030a0a; border: 1px solid #0a2818; border-radius: 5px; padding: 6px; font-family: 'Courier New', monospace; font-size: 8.5px; line-height: 1.6; color: #60c880; white-space: pre-wrap; word-break: break-all; max-height: 52vh; overflow-y: auto; margin-top: 6px; }
.log-sep { color: #2a6a40; font-weight: 700; }
.log-warn { color: #ffa040; }
.log-err  { color: #ff5050; }
.log-ok   { color: #40ff80; }
</style>
</head>
<body>

<h1>Audio Recording Investigation</h1>
<p class="sub">Minimal reproduction — no React, no Pixi, no PáircVision.</p>

<canvas id="c" width="320" height="180"></canvas>

<div id="statusLine">Idle</div>

<div class="btn-row">
  <button id="btnA">A: Silent<br>auto MIME</button>
  <button id="btnB">B: Mic<br>auto MIME</button>
  <button id="btnC">C: Mic<br>MP4 explicit</button>
  <button id="btnD">D: Mic<br>WebM explicit</button>
  <button id="btnStop" disabled>Stop</button>
</div>

<video id="preview" controls playsinline></video>

<div class="action-row">
  <button id="btnDownload" disabled>Download</button>
  <button id="btnOpenTab" disabled>Open Tab</button>
</div>

<div id="log">Tap A, B, C or D to begin a 5-second test recording.</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('statusLine');
const logEl    = document.getElementById('log');
const preview  = document.getElementById('preview');
const btnA     = document.getElementById('btnA');
const btnB     = document.getElementById('btnB');
const btnC     = document.getElementById('btnC');
const btnD     = document.getElementById('btnD');
const btnStop  = document.getElementById('btnStop');
const btnDl    = document.getElementById('btnDownload');
const btnTab   = document.getElementById('btnOpenTab');
const ALL_TEST_BTNS = [btnA, btnB, btnC, btnD];

// ── Canvas animation ──────────────────────────────────────────────────────────
let hue = 0, bx = 20, bvx = 2;
function drawFrame() {
  hue = (hue + 1.5) % 360;
  bx += bvx;
  if (bx > 250 || bx < 10) bvx = -bvx;
  ctx.fillStyle = '#060c14'; ctx.fillRect(0, 0, 320, 180);
  ctx.fillStyle = `hsl(${hue},78%,55%)`; ctx.fillRect(bx, 65, 70, 50);
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '9px monospace';
  ctx.fillText(new Date().toISOString().slice(14, 23), 4, 175);
  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── Logging ───────────────────────────────────────────────────────────────────
let currentBlob = null, currentBlobUrl = null, recorder = null, timer = null;

function cls() { logEl.textContent = ''; }
function log(msg, cls2) {
  const line = document.createTextNode(msg + '\n');
  if (cls2) {
    const sp = document.createElement('span');
    sp.className = cls2;
    sp.appendChild(line);
    logEl.appendChild(sp);
  } else { logEl.appendChild(line); }
  logEl.scrollTop = logEl.scrollHeight;
}
function sep(t) { log('\n── ' + t + ' ──', 'log-sep'); }
function warn(m) { log('⚠ ' + m, 'log-warn'); }
function ok(m)   { log('✓ ' + m, 'log-ok'); }
function err(m)  { log('✗ ' + m, 'log-err'); }

// ── MIME support audit ────────────────────────────────────────────────────────
const MIME_CANDIDATES = [
  'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
  'video/mp4;codecs=avc1,mp4a.40.2',
  'video/mp4;codecs=avc1',
  'video/webm;codecs=vp9,opus',
  'video/webm;codecs=vp8,opus',
  'video/webm',
  'video/mp4',
];

function auditMimeSupport() {
  sep('isTypeSupported');
  log('UA: ' + navigator.userAgent.slice(0, 100));
  let first = null;
  for (const m of MIME_CANDIDATES) {
    const s = (typeof MediaRecorder !== 'undefined') && MediaRecorder.isTypeSupported(m);
    log((s ? '✓ ' : '✗ ') + m);
    if (s && !first) first = m;
  }
  return first || 'video/webm';
}

// ── Stream composition audit ──────────────────────────────────────────────────
function auditStream(stream, label) {
  sep('Stream: ' + label);
  const tracks = stream.getTracks();
  log('total tracks: ' + tracks.length);
  tracks.forEach((t, i) => {
    const s = t.getSettings();
    const c = t.getConstraints();
    const issues = [];
    if (t.readyState === 'ended')  issues.push('ENDED');
    if (t.muted)                   issues.push('MUTED');
    if (!t.enabled)                issues.push('DISABLED');
    const badgeStr = issues.length ? ' !! ' + issues.join(' ') : '';
    log(`[${i}] kind:${t.kind} state:${t.readyState} enabled:${t.enabled} muted:${t.muted}${badgeStr}`);
    log(`    label:"${t.label}"`);
    log(`    settings:${JSON.stringify(s)}`);
    log(`    constraints:${JSON.stringify(c)}`);
    if (issues.length) warn('Track ' + i + ' has issues: ' + issues.join(', '));
  });
  // Duplicate track check
  const ids = tracks.map(t => t.id);
  const dups = ids.filter((id, idx) => ids.indexOf(id) !== idx);
  if (dups.length) warn('DUPLICATE track IDs: ' + dups.join(', '));
  else ok('No duplicate tracks');
}

// ── Box type scanner (pattern scan over the full init chunk) ─────────────────
// Scans for known 4-byte ISOBMFF box type signatures in chunk[0].
// This is not a full parser — it finds codec/handler markers by byte pattern.
const BOX_TARGETS = [
  'ftyp','styp','moov','mvhd','mvex','trex',
  'trak','tkhd','mdia','mdhd','hdlr','minf','stbl','stsd','stts','stsz','stco',
  'mp4a','esds',    // AAC audio codec + ES_Descriptor (AudioSpecificConfig)
  'Opus',           // Opus audio in MP4 (non-standard — Chrome bug)
  'avc1','avc3',    // H.264 video
  'hvc1','hev1',    // HEVC video
  'vp09',           // VP9 video
  'soun','vide',    // handler types (audio/video track existence)
  'moof','mfhd','traf','tfhd','trun',  // fragmented MP4 segment boxes
  'mdat',
];

function scanBoxTypes(buf) {
  const ua8 = new Uint8Array(buf);
  const found = new Set();
  for (let i = 0; i + 4 <= ua8.length; i++) {
    const t = String.fromCharCode(ua8[i], ua8[i+1], ua8[i+2], ua8[i+3]);
    if (BOX_TARGETS.includes(t)) found.add(t);
  }
  return [...found].sort();
}

function auditBoxes(buf, chunkLabel) {
  sep('Box scan: ' + chunkLabel);
  const found = scanBoxTypes(buf);
  log('found: ' + (found.length ? found.join(' ') : '(none)'));

  // Container type
  const ua8 = new Uint8Array(buf, 0, Math.min(32, buf.byteLength));
  const hex32 = Array.from(ua8).map(b => b.toString(16).padStart(2,'0')).join(' ');
  log('bytes[0..31]: ' + hex32);
  const isWebM = ua8[0]===0x1a && ua8[1]===0x45 && ua8[2]===0xdf && ua8[3]===0xa3;
  const isMp4  = ua8.length>=8 && ua8[4]===0x66 && ua8[5]===0x74 && ua8[6]===0x79 && ua8[7]===0x70;
  log('container: ' + (isWebM ? 'WebM/EBML' : isMp4 ? 'MP4 (ftyp)' : 'UNKNOWN'));

  // Audio codec inference
  if (found.includes('mp4a') && found.includes('esds')) {
    ok('AAC: mp4a+esds both present (normal AAC-LC)');
  } else if (found.includes('mp4a') && !found.includes('esds')) {
    err('AAC BROKEN: mp4a present but esds MISSING — no AudioSpecificConfig');
    warn('This would cause audio decode failure');
  } else if (found.includes('Opus')) {
    warn('Opus audio found in MP4 container (Chrome fallback — may not play on all devices)');
  } else if (found.includes('soun') && !found.includes('mp4a') && !found.includes('Opus')) {
    err('Audio track (soun) exists but NO recognised audio codec box found');
  }

  // Video codec
  if (found.includes('avc1') || found.includes('avc3')) ok('H.264 video codec confirmed (avc1/avc3)');
  else if (found.includes('vp09')) ok('VP9 video codec confirmed (vp09)');
  else if (found.includes('hvc1') || found.includes('hev1')) ok('HEVC video codec confirmed');
  else if (found.includes('vide')) warn('Video track (vide) found but no recognised video codec box');

  return { isWebM, isMp4, found };
}

// ── Recorder setup ────────────────────────────────────────────────────────────
function setTestBtnsDisabled(disabled) {
  ALL_TEST_BTNS.forEach(b => { b.disabled = disabled; });
  btnStop.disabled = !disabled;
}

function attachVideoEvents(vid) {
  sep('Video element events');
  vid.onloadstart     = () => log('loadstart   rs:' + vid.readyState + ' ns:' + vid.networkState);
  vid.onloadedmetadata= () => ok('loadedmetadata rs:' + vid.readyState + ' dur:' + (vid.duration||0).toFixed(2) + 's ' + vid.videoWidth + 'x' + vid.videoHeight);
  vid.onloadeddata    = () => ok('loadeddata  rs:' + vid.readyState);
  vid.oncanplay       = () => ok('canplay     rs:' + vid.readyState);
  vid.onstalled       = () => warn('stalled     rs:' + vid.readyState + ' ns:' + vid.networkState);
  vid.onabort         = () => err('ABORT       rs:' + vid.readyState);
  vid.onerror         = () => err('ERROR code:' + (vid.error ? vid.error.code : '?') + ' "' + (vid.error ? vid.error.message : '') + '"');
  // NO el.load() — plain src= assignment only
}

async function runTest(label, withMic, mimeOverride) {
  cls();
  currentBlob = null;
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  preview.removeAttribute('src');
  preview.onloadstart = preview.onloadedmetadata = preview.onloadeddata =
    preview.oncanplay = preview.onstalled = preview.onabort = preview.onerror = null;
  btnDl.disabled = true;
  btnTab.disabled = true;
  statusEl.textContent = 'Recording — ' + label + '…';

  log('Test: ' + label);
  const autoMime = auditMimeSupport();

  // ── Acquire mic ────────────────────────────────────────────────────────────
  let audioStream = null;
  if (withMic) {
    sep('Microphone');
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      ok('getUserMedia succeeded');
      const at = audioStream.getAudioTracks()[0];
      if (at) {
        const s = at.getSettings();
        const c = at.getConstraints();
        log('kind:' + at.kind + ' readyState:' + at.readyState + ' enabled:' + at.enabled + ' muted:' + at.muted);
        log('label:"' + at.label + '"');
        log('settings:' + JSON.stringify(s));
        log('constraints:' + JSON.stringify(c));
        if (at.readyState === 'ended') err('Audio track already ENDED before recording starts');
        if (at.muted) warn('Audio track is MUTED');
      } else {
        err('getUserMedia returned 0 audio tracks');
      }
    } catch(e) {
      err('getUserMedia failed: ' + e.name + ': ' + e.message);
      audioStream = null;
    }
  }

  // ── Canvas stream ─────────────────────────────────────────────────────────
  sep('Canvas stream');
  const canvasStream = canvas.captureStream(30);
  const vt = canvasStream.getVideoTracks()[0];
  if (vt) {
    const s = vt.getSettings();
    log('kind:' + vt.kind + ' readyState:' + vt.readyState + ' enabled:' + vt.enabled + ' muted:' + vt.muted);
    log('label:"' + vt.label + '"');
    log('settings:' + JSON.stringify(s));
    if (vt.readyState === 'ended') err('Canvas video track ENDED before recording');
  } else { err('captureStream returned 0 video tracks'); }

  // ── Merge streams ─────────────────────────────────────────────────────────
  const audioTracks = audioStream ? audioStream.getAudioTracks() : [];
  const hasAudio = audioTracks.length > 0;
  const stream = hasAudio
    ? new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks])
    : canvasStream;

  auditStream(stream, hasAudio ? 'video+audio merged' : 'video only');

  // ── Chosen MIME ───────────────────────────────────────────────────────────
  const chosenMime = mimeOverride || autoMime;
  sep('MediaRecorder');
  log('chosen MIME: ' + chosenMime);
  log('(auto would be: ' + autoMime + ')');

  let rec;
  try {
    rec = new MediaRecorder(stream, { mimeType: chosenMime });
  } catch(e) {
    warn('MediaRecorder({ mimeType }) threw — falling back to no mimeType: ' + e.message);
    try {
      rec = new MediaRecorder(stream);
    } catch(e2) {
      err('MediaRecorder() failed entirely: ' + e2.message);
      setTestBtnsDisabled(false);
      statusEl.textContent = 'Error — see log';
      return;
    }
  }
  recorder = rec;

  log('requested:          "' + chosenMime + '"');
  log('recorder.mimeType:  "' + rec.mimeType + '"');
  log('videoBitsPerSecond: ' + rec.videoBitsPerSecond);
  log('audioBitsPerSecond: ' + rec.audioBitsPerSecond);

  if (rec.mimeType !== chosenMime && rec.mimeType.split(';')[0] !== chosenMime.split(';')[0]) {
    warn('recorder.mimeType container differs from requested — browser substituted');
  }
  if (hasAudio && rec.audioBitsPerSecond === 0) {
    warn('audioBitsPerSecond is 0 despite audio track present');
  }

  // ── Record 5 seconds ─────────────────────────────────────────────────────
  const chunks = [];
  rec.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };

  rec.onstop = () => {
    if (audioStream) audioStream.getTracks().forEach(t => t.stop());

    sep('Recording complete');
    log('chunk count: ' + chunks.length);
    log('chunk sizes: ' + chunks.map(c => c.size).join(', '));

    const blobMime = rec.mimeType.split(';')[0].trim();
    const blob = new Blob(chunks, { type: blobMime });
    log('blob.size: ' + blob.size + ' blob.type: "' + blob.type + '"');

    currentBlob = blob;
    const url = URL.createObjectURL(blob);
    currentBlobUrl = url;

    // Box scan on first chunk (init segment) and whole blob
    const firstChunk = chunks[0];
    const allBuf = blob;
    if (firstChunk) {
      firstChunk.arrayBuffer().then(buf => {
        const r1 = auditBoxes(buf, 'chunk[0]');
        // Also scan whole blob to catch audio boxes that may appear later
        return allBuf.arrayBuffer().then(wholeBuf => {
          sep('Box scan: full blob');
          const allFound = scanBoxTypes(wholeBuf);
          log('all boxes: ' + (allFound.length ? allFound.join(' ') : '(none)'));

          // Final verdict
          sep('Audio verdict');
          const hasSoun = allFound.includes('soun');
          const hasMp4a = allFound.includes('mp4a');
          const hasEsds = allFound.includes('esds');
          const hasOpus = allFound.includes('Opus');
          if (!hasAudio) {
            ok('Silent recording — no audio expected');
          } else if (!hasSoun && !hasMp4a && !hasOpus) {
            err('AUDIO TRACK MISSING from output despite mic being active');
          } else if (hasMp4a && hasEsds) {
            ok('AAC looks complete: mp4a + esds both found');
          } else if (hasMp4a && !hasEsds) {
            err('AAC BROKEN: mp4a present, esds MISSING → AudioSpecificConfig absent → decoder will fail');
          } else if (hasOpus) {
            warn('Opus audio written into MP4 container — may not play on all decoders');
          }

          // Attach preview (no el.load())
          attachVideoEvents(preview);
          preview.src = url;
          btnDl.disabled = false;
          btnTab.disabled = false;
          setTestBtnsDisabled(false);
          statusEl.textContent = 'Done — ' + label;
        });
      });
    } else {
      err('No chunks recorded');
      setTestBtnsDisabled(false);
      statusEl.textContent = 'Done (no data) — ' + label;
    }
  };

  setTestBtnsDisabled(true);
  rec.start(200);
  timer = setTimeout(() => {
    if (rec.state !== 'inactive') rec.stop();
    timer = null;
  }, 5000);
}

// ── Button wiring ─────────────────────────────────────────────────────────────
btnA.onclick = () => void runTest('A: Silent / auto MIME', false, null);
btnB.onclick = () => void runTest('B: Mic / auto MIME', true, null);
btnC.onclick = () => void runTest('C: Mic / MP4 explicit avc1+mp4a', true, 'video/mp4;codecs=avc1.42E01E,mp4a.40.2');
btnD.onclick = () => void runTest('D: Mic / WebM vp9+opus', true, 'video/webm;codecs=vp9,opus');

btnStop.onclick = () => {
  if (timer) { clearTimeout(timer); timer = null; }
  if (recorder && recorder.state !== 'inactive') recorder.stop();
};

btnDl.onclick = () => {
  if (!currentBlob || !currentBlobUrl) return;
  const ext = (currentBlob.type === 'video/mp4') ? 'mp4' : 'webm';
  const a = document.createElement('a');
  a.href = currentBlobUrl;
  a.download = 'pvtest-' + Date.now() + '.' + ext;
  a.click();
};
btnTab.onclick = () => { if (currentBlobUrl) window.open(currentBlobUrl, '_blank'); };
</script>
</body>
</html>
