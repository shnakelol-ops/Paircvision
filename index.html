<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="PáircVision" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PáircVision" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#03100B" />
    <meta property="og:title" content="PáircVision | Built for GAA Coaches" />
    <meta name="twitter:title" content="PáircVision | Built for GAA Coaches" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/pv-logo-favicon.svg" />
    <link rel="apple-touch-icon" href="/pv-logo-icon.svg" />
    <style>
      html {
        /* Prevent iOS Safari from auto-scaling fonts when layout reflows */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: #03100b;
      }

      body {
        color: #f1f7f0;
      }

      /*
       * iOS Safari applies -webkit-appearance:button by default, which activates
       * the UA stylesheet's own padding/sizing and prevents explicit padding,
       * min-height, and width from being honoured. This reset makes <button>
       * behave identically on iOS Safari and Android Chrome.
       */
      button {
        -webkit-appearance: none;
        appearance: none;
        font-family: inherit;
        box-sizing: border-box;
      }
    </style>
    <title>PáircVision | Built for GAA Coaches</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
